{% extends 'base.html' %}

<!-- File: templates/events/event_confirm_delete.html -->
{% block title %}Delete Event{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card text-center p-4 p-md-5" data-aos="fade-up">
        <div class="mb-4">
          <div class="auth-icon-wrapper mx-auto mb-4"
               style="background:rgba(239,68,68,0.15); border-color:rgba(239,68,68,0.4);">
            <i class="bi bi-trash-fill" style="color:#ef4444;"></i>
          </div>
          <h3 class="fw-700 mb-2">Delete Event?</h3>
          <p class="text-muted">
            You're about to permanently delete:<br>
            <strong>{{ event.title }}</strong>
          </p>
          <div class="alert alert-danger text-start">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <strong>Warning:</strong> This will also delete all registrations for this event.
            This action cannot be undone.
          </div>
        </div>
        <div class="d-flex gap-3 justify-content-center">
          <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger px-4">
              <i class="bi bi-trash me-2"></i>Yes, Delete Event
            </button>
          </form>
          <a href="{% url 'events:event_detail' slug=event.slug %}" class="btn btn-outline-secondary px-4">
            Cancel
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
